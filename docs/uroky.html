<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Уроки — Міст для Батьків та Дітей</title>
<meta name="description" content="Короткі онлайн-уроки з поясненням і тестом на закріплення. Прогрес дитини видно батькам у кабінеті.">
<meta property="og:type" content="website">
<meta property="og:title" content="Уроки — Міст для Батьків та Дітей">
<meta property="og:description" content="Короткі уроки з тестом на закріплення; прогрес — у кабінеті батьків.">
<meta property="og:image" content="assets/og-cover.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<style>
  .subjblock{margin-bottom:26px;}
  .subjhead{display:flex; align-items:center; gap:11px; margin:0 0 12px;}
  .subjhead .si{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:var(--green-bg);color:var(--green);}
  .subjhead h2{margin:0; font-size:1.4rem;}
  .lrow{display:flex; align-items:center; gap:14px; justify-content:space-between; flex-wrap:wrap; background:var(--paper); border:1px solid var(--line); border-radius:16px; padding:14px 18px; margin-bottom:10px; box-shadow:var(--sh-s);}
  .lrow .lmain b{display:block; color:var(--head); font-family:'Fraunces',serif; font-size:1.08rem;}
  .lrow .lmain span{color:var(--muted); font-size:.86rem; font-weight:700;}
  .lrow .lright{display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
  .lbadge{font-size:.8rem; font-weight:800; padding:5px 11px; border-radius:999px; border:1px solid var(--line);}
  .lbadge.done{background:var(--green-bg); color:var(--green);}
  .lbadge.todo{background:var(--paper2); color:var(--muted);}
  .kidnote{display:flex; gap:10px; align-items:center; background:var(--green-bg); border:1px solid var(--line); border-radius:14px; padding:12px 15px; margin-bottom:18px; font-size:.94rem; color:var(--ink);}
</style>
</head>
<body>
<div class="grain"></div>
<header id="site-header"></header>

<section class="wrap">
  <div class="phero">
    <span class="eyebrow lab"><span class="ink-ic" data-icon="cap"></span> онлайн-уроки</span>
    <h1>Уроки</h1>
    <p>Короткі уроки з поясненням і тестом на закріплення. Підліток проходить сам — а прогрес видно батькам у кабінеті. Починаємо з математики, далі більше.</p>
  </div>

  <div class="section" style="padding-top:8px">
    <div id="kidNote"></div>
    <div id="catalog"><p class="muted">Завантажуємо уроки…</p></div>
  </div>
  <div class="spacer-lg"></div>
</section>

<footer id="site-footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/config.js" onerror="window.__noCfg=true"></script>
<script src="assets/db.js"></script>
<script src="assets/app.js"></script>
<script>
  Site.init('urok');
  var SUBJ = { math:{name:'Математика', icon:'sigma'}, history:{name:'Історія України', icon:'book'}, ukr:{name:'Українська', icon:'book'}, physics:{name:'Фізика', icon:'flask'} };
  function esc(s){ return (s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  function render(lessons, progressMap, kidName){
    var note=document.getElementById('kidNote');
    if(kidName){ note.innerHTML='<div class="kidnote"><span class="ink-ic" data-icon="spark"></span> Прогрес рахується для: <b style="margin-left:4px">'+esc(kidName)+'</b>. Змінити дитину можна в кабінеті.</div>'; }
    else { note.innerHTML='<div class="kidnote"><span class="ink-ic" data-icon="lock"></span> <a href="vhid.html">Увійдіть</a>, щоб прогрес уроків зберігався в кабінеті та був видно батькам.</div>'; }
    Site.paint(note);

    if(!lessons.length){ document.getElementById('catalog').innerHTML='<p class="muted">Поки що уроків немає — скоро зʼявляться.</p>'; return; }
    // групуємо по предмету
    var groups={}; lessons.forEach(function(l){ (groups[l.subject]=groups[l.subject]||[]).push(l); });
    var order=Object.keys(groups);
    var html=order.map(function(sub){
      var meta=SUBJ[sub]||{name:sub, icon:'book'};
      var rows=groups[sub].sort(function(a,b){ return (a.grade-b.grade)||(a.position-b.position); }).map(function(l){
        var p=progressMap[l.id];
        var done=p && p.status==='done';
        var badge=done
          ? '<span class="lbadge done"><span data-icon="check" style="width:12px;height:12px"></span> Пройдено'+(p.score!=null?' · '+p.score:'')+'</span>'
          : '<span class="lbadge todo">Не пройдено</span>';
        var isExt=!!l.external_url;
        var tag=isExt?' <span class="lbadge todo">ВШО</span>':'';
        var right=isExt
          ? '<a class="btn btn-soft btn-sm" href="'+l.external_url+'" target="_blank" rel="noopener">Відкрити на ВШО <span data-icon="step"></span></a><button class="btn btn-green btn-sm" onclick="markExt(\''+l.id+'\',this)">'+(done?'Позначено ✓':'Я позаймався')+'</button>'
          : '<a class="btn btn-green btn-sm" href="urok.html?id='+l.id+'">'+(done?'Повторити':'Почати')+' <span data-icon="step"></span></a>';
        return '<div class="lrow"><div class="lmain"><b>'+esc(l.title)+tag+'</b><span>'+(l.grade?l.grade+' клас · ':'')+(l.duration_min||20)+' хв</span></div><div class="lright">'+badge+right+'</div></div>';
      }).join('');
      return '<div class="subjblock"><div class="subjhead"><span class="si" data-icon="'+meta.icon+'"></span><h2>'+meta.name+'</h2></div>'+rows+'</div>';
    }).join('');
    document.getElementById('catalog').innerHTML=html;
    Site.paint();
  }

  function markExt(lessonId, btn){
    if(!(window.MistDB && MistDB.isCloud && MistDB.isCloud() && Site.getActiveKidId)){ Site.toast('Увійдіть, щоб зберегти, що ви позаймались.'); return; }
    var childId=Site.getActiveKidId(); if(!childId){ Site.toast('Спершу оберіть дитину в кабінеті.'); return; }
    if(btn) btn.disabled=true;
    MistDB.progress.set(childId, lessonId, 'done', null).then(function(){
      Site.toast('Записано в кабінет: позаймались. 👏');
      if(btn){ btn.textContent='Позначено ✓'; btn.classList.remove('btn-green'); btn.classList.add('btn-soft'); btn.disabled=false; }
    }).catch(function(){ Site.toast('Не вдалося зберегти.'); if(btn) btn.disabled=false; });
  }
  window.markExt=markExt;

  (function init(){
    if(!(window.MistDB && MistDB.configured)){
      document.getElementById('catalog').innerHTML='<p class="muted">Уроки запрацюють після підключення бази.</p>'; return;
    }
    MistDB.cloud.activate().catch(function(){}).then(function(){
      var childId=null, kidName=null;
      try{ if(MistDB.isCloud && MistDB.isCloud() && Site.getActiveKidId){ childId=Site.getActiveKidId(); var ks=Site.getKids(); var ak=ks.filter(function(k){return k.active;})[0]; kidName=ak?ak.name:null; } }catch(e){}
      return Promise.all([
        MistDB.lessons.list(),
        childId ? MistDB.progress.list(childId) : Promise.resolve({data:[]})
      ]).then(function(rs){
        var lessons=(rs[0].data)||[];
        var pmap={}; ((rs[1]&&rs[1].data)||[]).forEach(function(p){ pmap[p.lesson_id]={status:p.status, score:p.score}; });
        render(lessons, pmap, kidName);
      });
    }).catch(function(){ document.getElementById('catalog').innerHTML='<p class="muted">Не вдалося завантажити уроки.</p>'; });
  })();
</script>
</body>
</html>
