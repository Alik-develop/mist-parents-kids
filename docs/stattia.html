<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Стаття — Міст для Батьків та Дітей</title>
<meta property="og:type" content="article">
<meta property="og:title" content="База знань — Міст для Батьків та Дітей">
<meta property="og:description" content="Тепла порада на твердій основі: наука + живий досвід Оксани.">
<meta property="og:image" content="assets/og-cover.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<style>
  .artwrap{max-width:760px; margin:0 auto;}
  .artcover{border-radius:var(--r); overflow:hidden; border:1px solid var(--line); box-shadow:var(--sh); margin:6px 0 22px; aspect-ratio:16/10; background:var(--green-bg); display:flex; align-items:center; justify-content:center;}
  .artcover img{width:100%; height:100%; object-fit:cover; display:block;}
  .artcover .ph{display:flex; align-items:center; justify-content:center; width:100%; height:100%; color:var(--green2);}
  .artcover .ph svg{width:74px; height:74px;}
  .artbody{font-size:1.1rem; color:var(--ink); line-height:1.72;}
  .artbody p{margin:0 0 16px;}
  .artbody h4{font-family:'Fraunces',serif; font-size:1.2rem; color:var(--head); margin:24px 0 8px;}
  .artbody blockquote{margin:20px 0; padding:16px 20px; background:var(--green-bg); border-left:5px solid var(--green); border-radius:0 14px 14px 0; color:var(--ink); font-size:1.06rem;}
  .artbody b{color:var(--head);}
  .artmeta{display:flex; align-items:center; gap:12px; margin:14px 0 2px; flex-wrap:wrap;}
  .srcline{font-size:.9rem; color:var(--muted); font-weight:700; margin-top:20px; padding-top:16px; border-top:1px solid var(--line2);}
  .srcline a{color:var(--blue);}
  .backlink{color:var(--muted); font-weight:800; font-size:.94rem; display:inline-flex; gap:7px; align-items:center;}
  .relbox{margin-top:30px;}
</style>
</head>
<body>
<div class="grain"></div>
<header id="site-header"></header>

<section class="wrap">
  <div class="artwrap">
    <div style="padding:30px 0 4px"><a class="backlink" href="baza-znan.html">← Уся база знань</a></div>
    <div id="art"></div>
  </div>
  <div class="spacer-lg"></div>
</section>

<footer id="site-footer"></footer>
<script src="assets/app.js"></script>
<script>
  Site.init('baza');
  var SCALES = Site.SCALES, SCALE_IMG = Site.SCALE_IMG, A = Site.ARTICLES;
  function getI(){ var m = location.search.match(/[?&]i=(\d+)/); return m ? parseInt(m[1],10) : 0; }
  var i = getI();
  var a = A[i] || A[0];
  document.title = a.title + ' — Міст для Батьків та Дітей';

  var phFallback = '<span class="ph" data-icon="'+a.icon+'"></span>';
  var cover = SCALE_IMG[a.scale]
    ? Site.img(SCALE_IMG[a.scale], a.title, phFallback)
    : phFallback;

  document.getElementById('art').innerHTML =
    '<div class="artmeta"><span class="tag '+a.scale+'">'+SCALES[a.scale]+'</span></div>'+
    '<h1 style="font-size:2.3rem; line-height:1.1; margin:6px 0 4px">'+a.title+'</h1>'+
    '<div class="artcover">'+cover+'</div>'+
    '<div class="artbody">'+(a.body || ('<p>'+a.teaser+'</p>'))+'</div>'+
    '<div class="srcline">Джерело: <a href="'+a.url+'" target="_blank" rel="noopener">'+a.src+'</a></div>'+
    '<div class="relbox"><div class="note-box"><span class="ink-ic" data-icon="compass"></span><span>Це освітній матеріал, а не діагноз. Хочете побачити, що саме турбує вашу дитину? <a href="opytuvannya.html">Пройти тест →</a></span></div></div>';

  // схожі статті тієї ж зони
  var rel = A.map(function(x,idx){return {x:x,idx:idx};}).filter(function(o){ return o.x.scale===a.scale && o.idx!==i; }).slice(0,3);
  if(rel.length){
    var html = '<div class="section"><h2 style="font-size:1.4rem; margin:0 0 14px">Схожі теми</h2><div class="grid g3">'+
      rel.map(function(o){
        return '<a class="article h" href="stattia.html?i='+o.idx+'" style="text-decoration:none">'+
          '<div class="atop" style="display:flex; align-items:center; gap:12px"><span class="ic" data-icon="'+o.x.icon+'" style="width:42px;height:42px;border-radius:12px;background:var(--green-bg);color:var(--green);display:flex;align-items:center;justify-content:center"></span><span class="tag '+o.x.scale+'">'+SCALES[o.x.scale]+'</span></div>'+
          '<h3>'+o.x.title+'</h3>'+
          '<p>'+o.x.teaser.slice(0,110)+'…</p>'+
          '<span class="lnk">Читати <span data-icon="step"></span></span>'+
        '</a>';
      }).join('')+'</div></div>';
    document.getElementById('art').insertAdjacentHTML('beforeend', html);
  }
  Site.paint();
</script>
</body>
</html>
