<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Урок — Міст для Батьків та Дітей</title>
<meta property="og:type" content="website">
<meta property="og:title" content="Урок — Міст для Батьків та Дітей">
<meta property="og:description" content="Короткий урок із поясненням і тестом на закріплення. Прогрес видно батькам у кабінеті.">
<meta property="og:image" content="assets/og-cover.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<style>
  .lwrap{max-width:760px; margin:0 auto; padding:18px 0 60px;}
  .lhead{margin-bottom:18px;}
  .lmeta{display:flex; gap:8px; flex-wrap:wrap; margin:8px 0 0;}
  .lpill{font-size:.78rem; font-weight:800; letter-spacing:.3px; padding:4px 11px; border-radius:999px; background:var(--green-bg); color:var(--green); border:1px solid var(--line);}
  .lcard{background:var(--paper); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--sh-s); padding:22px 24px; margin-bottom:16px;}
  .lvideo{aspect-ratio:16/9; border-radius:16px; overflow:hidden; border:1px solid var(--line); background:var(--green-bg); display:flex; align-items:center; justify-content:center; color:var(--green); margin-bottom:16px;}
  .lvideo iframe{width:100%; height:100%; border:0;}
  .lvideo .vph{text-align:center; padding:20px;}
  .lvideo .vph .ic{width:46px;height:46px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;}
  .lvideo .vph .ic svg{width:34px;height:34px;}
  .lmaterial{color:var(--ink); line-height:1.6;}
  .lmaterial p{margin:0 0 10px;}
  .quiz h3{margin:0 0 4px; font-size:1.3rem;}
  .q{padding:14px 0; border-top:1px solid var(--line2);}
  .q:first-of-type{border-top:none;}
  .q .qq{font-weight:800; margin:0 0 10px; color:var(--ink);}
  .q .opts{display:flex; flex-wrap:wrap; gap:9px;}
  .q .opt{padding:9px 16px; border-radius:12px; border:1.5px solid var(--line); background:var(--paper2); font-weight:700; font-size:.95rem; color:var(--ink); cursor:pointer; transition:.12s;}
  .q .opt:hover{border-color:var(--green2);}
  .q .opt.sel{background:var(--green); color:var(--on-accent); border-color:var(--green);}
  .q.done .opt{cursor:default;}
  .q.done .opt.correct{background:var(--green-bg); border-color:var(--green); color:var(--green);}
  .q.done .opt.wrong{background:var(--clay-bg); border-color:var(--clay); color:var(--clay);}
  .lresult{background:var(--green-bg); border:1px solid var(--line); border-radius:16px; padding:18px 20px; margin-top:6px; display:none;}
  .lresult.show{display:block;}
  .lresult b{color:var(--head);}
  .lnav{display:flex; gap:12px; flex-wrap:wrap; margin-top:18px;}
  .lnote{font-size:.88rem; color:var(--muted); margin-top:10px;}
</style>
</head>
<body>
<div class="grain"></div>
<header id="site-header"></header>

<section class="wrap">
  <div class="lwrap">
    <a class="back" href="uroky.html" style="color:var(--muted); font-weight:800; font-size:.94rem;">← Усі уроки</a>
    <div id="lessonBody" style="margin-top:12px">
      <div class="lcard"><p class="muted" style="margin:0">Завантажуємо урок…</p></div>
    </div>
  </div>
</section>

<footer id="site-footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/config.js" onerror="window.__noCfg=true"></script>
<script src="assets/db.js"></script>
<script src="assets/app.js"></script>
<script>
  Site.init('urok');
  var SUBJ = { math:'Математика', history:'Історія України', ukr:'Українська', physics:'Фізика' };
  var state = { lesson:null, questions:[], answers:{}, childId:null, lessonId:null, graded:false };

  function ytEmbed(url){
    if(!url) return null;
    var m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([\w-]{11})/);
    if(m) return 'https://www.youtube.com/embed/'+m[1];
    return url;
  }
  function esc(s){ return (s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  function render(){
    var L = state.lesson, qs = state.questions;
    if(!L){ document.getElementById('lessonBody').innerHTML = '<div class="lcard"><p>Поки що уроків немає. Зазирніть пізніше.</p><div class="lnav"><a class="btn btn-soft" href="uroky.html">До каталогу</a></div></div>'; return; }
    if(L.external_url){
      document.getElementById('lessonBody').innerHTML =
        '<div class="lhead"><h1 style="margin:0">'+esc(L.title)+'</h1><div class="lmeta"><span class="lpill">'+(SUBJ[L.subject]||L.subject)+'</span><span class="lpill">ВШО</span></div>'+(L.summary?'<p class="muted" style="margin:10px 0 0">'+esc(L.summary)+'</p>':'')+'</div>'+
        '<div class="lcard"><p class="lmaterial">Цей урок — на безкоштовній платформі ВШО (Всеукраїнська школа онлайн). Відкрий його там, а коли позаймаєшся — познач тут, щоб батьки бачили в кабінеті.</p>'+
        '<div class="lnav"><a class="btn btn-primary" href="'+L.external_url+'" target="_blank" rel="noopener">Відкрити на ВШО <span data-icon="step"></span></a>'+
        '<button class="btn btn-green" id="extDone" onclick="markExtDone()">Я позаймався <span data-icon="check"></span></button></div>'+
        '<div class="lresult" id="lresult"></div></div>';
      Site.paint(); return;
    }
    var emb = ytEmbed(L.video_url);
    var video = emb
      ? '<div class="lvideo"><iframe src="'+emb+'" allowfullscreen loading="lazy"></iframe></div>'
      : '<div class="lvideo"><div class="vph"><div class="ic" data-icon="play"></div>Відео-пояснення зʼявиться тут</div></div>';
    var quiz = qs.length ? (
      '<div class="lcard quiz"><h3>Перевір себе</h3><p class="muted" style="margin:0 0 6px">Короткий тест на закріплення.</p><div id="qlist"></div>'+
      '<button class="btn btn-primary" id="finishBtn" style="margin-top:8px" disabled onclick="finish()">Завершити урок <span data-icon="check"></span></button>'+
      '<div class="lresult" id="lresult"></div></div>'
    ) : '';
    document.getElementById('lessonBody').innerHTML =
      '<div class="lhead"><h1 style="margin:0">'+esc(L.title)+'</h1>'+
        '<div class="lmeta"><span class="lpill">'+(SUBJ[L.subject]||L.subject)+'</span>'+
          (L.grade?'<span class="lpill">'+L.grade+' клас</span>':'')+
          '<span class="lpill">'+(L.duration_min||20)+' хв</span></div>'+
        (L.summary?'<p class="muted" style="margin:10px 0 0">'+esc(L.summary)+'</p>':'')+
      '</div>'+
      '<div class="lcard">'+video+'<div class="lmaterial">'+(L.material||'<p>Матеріал уроку зʼявиться тут.</p>')+'</div></div>'+
      quiz;
    if(qs.length) renderQuiz();
    Site.paint();
  }
  function renderQuiz(){
    document.getElementById('qlist').innerHTML = state.questions.map(function(q,i){
      var opts = (q.options||[]).map(function(o,j){
        return '<button class="opt" data-q="'+i+'" data-o="'+j+'" onclick="pick('+i+','+j+')">'+esc(String(o))+'</button>';
      }).join('');
      return '<div class="q" data-qi="'+i+'"><p class="qq">'+(i+1)+'. '+esc(q.question)+'</p><div class="opts">'+opts+'</div></div>';
    }).join('');
  }
  function pick(qi, oi){
    if(state.graded) return;
    state.answers[qi] = oi;
    var q = document.querySelector('.q[data-qi="'+qi+'"]');
    q.querySelectorAll('.opt').forEach(function(b){ b.classList.toggle('sel', +b.dataset.o===oi); });
    var done = state.questions.every(function(_,i){ return state.answers[i]!==undefined; });
    var btn = document.getElementById('finishBtn'); if(btn) btn.disabled = !done;
  }
  window.pick = pick;

  function finish(){
    if(state.graded) return; state.graded = true;
    var correct = 0;
    state.questions.forEach(function(q,i){
      var qEl = document.querySelector('.q[data-qi="'+i+'"]'); qEl.classList.add('done');
      var ans = state.answers[i];
      if(ans===q.correct) correct++;
      qEl.querySelectorAll('.opt').forEach(function(b){
        var o=+b.dataset.o;
        if(o===q.correct) b.classList.add('correct');
        else if(o===ans) b.classList.add('wrong');
      });
    });
    var total = state.questions.length;
    var res = document.getElementById('lresult');
    var ok = correct===total;
    var msg = '<b>Урок пройдено!</b> Результат: '+correct+' з '+total+'. '+(ok?'Чудова робота!':'Гарний старт — можна повторити, щоб закріпити.');
    if(state.childId && state.lessonId && window.MistDB){
      MistDB.progress.set(state.childId, state.lessonId, 'done', correct).then(function(){
        res.innerHTML = msg + '<div class="lnote">Збережено в кабінет — батьки побачать, що ти позаймався. 👏</div>';
      }).catch(function(){ res.innerHTML = msg + '<div class="lnote">Не вдалося зберегти в кабінет (спробуйте пізніше).</div>'; });
    } else {
      res.innerHTML = msg + '<div class="lnote"><a href="vhid.html">Увійдіть</a>, щоб зберігати прогрес у кабінеті.</div>';
    }
    res.classList.add('show');
    var btn=document.getElementById('finishBtn'); if(btn) btn.disabled=true;
    res.scrollIntoView({behavior:'smooth', block:'center'});
  }
  window.finish = finish;

  function markExtDone(){
    var res=document.getElementById('lresult'); if(!res) return;
    if(state.childId && state.lessonId && window.MistDB){
      MistDB.progress.set(state.childId, state.lessonId, 'done', null).then(function(){
        res.innerHTML='<b>Зараховано!</b> Батьки побачать у кабінеті, що ти позаймався. 👏'; res.classList.add('show');
        var b=document.getElementById('extDone'); if(b){ b.disabled=true; b.textContent='Позначено ✓'; }
      }).catch(function(){ res.innerHTML='Не вдалося зберегти. Спробуйте пізніше.'; res.classList.add('show'); });
    } else { res.innerHTML='<a href="vhid.html">Увійдіть</a>, щоб зберегти, що ви позаймались.'; res.classList.add('show'); }
  }
  window.markExtDone=markExtDone;

  (function init(){
    if(!(window.MistDB && MistDB.configured)){
      document.getElementById('lessonBody').innerHTML='<div class="lcard"><p>Уроки запрацюють після підключення бази.</p></div>'; return;
    }
    var id = (location.search.match(/[?&]id=([^&]+)/)||[])[1];
    if(id) id = decodeURIComponent(id);
    MistDB.cloud.activate().catch(function(){}).then(function(){
      try{ if(MistDB.isCloud && MistDB.isCloud() && window.Site.getActiveKidId) state.childId = Site.getActiveKidId(); }catch(e){}
      return id ? MistDB.lessons.get(id) : MistDB.lessons.list().then(function(r){
        var first = (r.data||[])[0];
        return first ? MistDB.lessons.get(first.id) : { lesson:null, questions:[] };
      });
    }).then(function(res){
      if(res && res.lesson){ state.lesson=res.lesson; state.questions=res.questions||[]; state.lessonId=res.lesson.id; }
      render();
    }).catch(function(){ render(); });
  })();
</script>
</body>
</html>
